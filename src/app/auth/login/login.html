<div class="min-h-[85vh] flex items-center justify-center px-4 relative overflow-hidden bg-gradient-to-br from-slate-50 to-indigo-100/50">
  
    <div class="absolute -top-10 -left-10 w-72 h-72 bg-violet-200 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
    <div class="absolute -bottom-10 -right-10 w-72 h-72 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>
  
    <div class="w-full max-w-md bg-white/60 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl shadow-indigo-100 border border-white/40 relative z-10 transition-all hover:shadow-indigo-200/50">
      
      <div class="text-center mb-10">
        <div class="mx-auto w-16 h-16 bg-gradient-to-tr from-indigo-600 to-violet-600 rounded-3xl flex items-center justify-center shadow-lg shadow-indigo-200 mb-6 rotate-3">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </div>
        <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">¡Hola de nuevo!</h1>
        <p class="text-slate-600 mt-3 text-lg">Ingresa a tu cuenta</p>
      </div>
  
      <div [formGroup]="loginForm" class="space-y-7">
        
        <div class="relative group">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5 pl-1">Correo Electrónico</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206" /></svg>
            </div>
            <input 
              type="email" 
              formControlName="email"
              placeholder="tu@correo.com"
              class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white/80 border border-slate-200 focus:bg-white focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all duration-200 text-slate-900 placeholder:text-slate-400 shadow-sm"
            >
          </div>
        </div>
  
        <div class="relative group">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5 pl-1">Contraseña</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </div>
            <input 
              type="password" 
              formControlName="password"
              placeholder="••••••••••••"
              class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white/80 border border-slate-200 focus:bg-white focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all duration-200 text-slate-900 placeholder:text-slate-400 shadow-sm"
            >
          </div>
        </div>
  
        <button 
          [disabled]="!loginForm.valid" 
          (click)="funIngresarConLaravel()"
          class="w-full py-4 px-6 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 disabled:from-slate-300 disabled:to-slate-400 disabled:cursor-not-allowed text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 hover:shadow-xl hover:shadow-indigo-300 transition-all transform active:scale-[0.98]"
        >
          Iniciar Sesión
        </button>
  
        <div class="text-center mt-6 text-sm text-slate-600">
          ¿No tienes cuenta? <a href="#" class="font-semibold text-indigo-600 hover:text-indigo-700 hover:underline">Regístrate gratis</a>
        </div>
  
        <details class="mt-8 pt-6 border-t border-slate-200/50 text-[11px] font-mono text-slate-400 bg-slate-50/50 p-4 rounded-xl">
          <summary class="cursor-pointer hover:text-slate-600 font-sans font-medium text-xs">Información de Desarrollo (Debug)</summary>
          <div class="space-y-1 mt-3">
              <p><span class="font-bold text-slate-600 uppercase">Estado:</span> {{ loginForm.valid ? '✅ Válido' : '❌ Inválido' }}</p>
              <p><span class="font-bold text-slate-600 uppercase">Token:</span> {{ token() ? '🔑 Generado' : '⏳ Esperando...' }}</p>
              <pre class="bg-white p-2 rounded border border-slate-100 mt-2 overflow-x-auto">{{ loginForm.value | json }}</pre>
          </div>
        </details>
  
      </div>
    </div>
  </div>
