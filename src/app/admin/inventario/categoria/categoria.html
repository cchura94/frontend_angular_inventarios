<div class="card">
    <p-button (click)="showDialog()" label="Nueva Categoria" />

    <p-table [value]="categorias()" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template #header>
            <tr>
                <th>Id</th>
                <th>Nombre</th>
                <th>Descripcion</th>
                <th>Acción</th>
            </tr>
        </ng-template>
        <ng-template #body let-categoria>
            <tr>
                <td>{{ categoria.id }}</td>
                <td>{{ categoria.nombre }}</td>
                <td>{{ categoria.descripcion }}</td>
                <td>
                    <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" (click)="editarCategoria(categoria)" />
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

    <p-dialog header="Nuevo Categoria" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
        <span class="p-text-secondary block mb-8">Actualiza la información de Categoria.</span>
        <form [formGroup]="categoriaForm" (ngSubmit)="funGuardarCategoria()">
            {{categoriaForm.valid}}
            <div class="flex items-center gap-4 mb-4">
                <label for="name" class="font-semibold w-24">Nombre</label>
                <input pInputText id="name" class="flex-auto" autocomplete="off" formControlName="nombre" />
            </div>
            <div class="flex items-center gap-4 mb-8">
                <label for="det" class="font-semibold w-24">descripcion</label>
                <input pInputText id="det" class="flex-auto" autocomplete="off" formControlName="descripcion" />
            </div>
            <div class="flex justify-end gap-2">
                <p-button label="Cancel" severity="secondary" (click)="visible = false" />
                <p-button label="Guardar Categoria" type="submit" />
            </div>
        </form>
    </p-dialog>
