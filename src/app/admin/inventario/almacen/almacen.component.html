<div class="p-6 bg-slate-50 min-h-screen">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
      <div>
        <h1 class="text-2xl font-black text-slate-800 tracking-tight">ALMACENES</h1>
        <div class="flex items-center gap-2 mt-1">
          <span class="text-slate-400 text-sm font-medium italic">Filtrar por sucursal:</span>
          <p-select 
            [options]="sucursales()" 
            [(ngModel)]="filtroSucursalId"
            [showClear]="true"
            optionLabel="nombre" 
            optionValue="id"
            placeholder="Todas las sucursales"
            class="w-64"
          />
        </div>
      </div>
      
      <p-button 
        (click)="showDialog()" 
        label="Nuevo Almacén" 
        icon="pi pi-plus-circle" 
        class="hover:scale-105 transition-transform"
        rounded="true"
      />
    </div>
  
    <p-table 
      [value]="almacenes()" 
      [rows]="8" 
      [paginator]="true" 
      styleClass="p-datatable-sm shadow-xl rounded-2xl overflow-hidden border border-slate-100"
    >
      <ng-template #header>
        <tr class="bg-slate-800">
          <th class="p-4 text-white font-semibold">Código</th>
          <th class="p-4 text-white font-semibold">Nombre Almacén</th>
          <th class="p-4 text-white font-semibold">Ubicación (Sucursal)</th>
          <th class="p-4 text-center text-white font-semibold">Acciones</th>
        </tr>
      </ng-template>
      
      <ng-template #body let-almacen>
        <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100 text-slate-600">
          <td class="p-4 font-mono font-bold text-primary-600">{{ almacen.codigo }}</td>
          <td class="p-4 font-medium">{{ almacen.nombre }}</td>
          <td class="p-4">
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-green-500"></span>
              {{ almacen.sucursal?.nombre }}
            </div>
          </td>
          <td class="p-4 text-center">
            <div class="flex justify-center gap-2">
              <p-button 
                icon="pi pi-pencil" 
                [text]="true" 
                (click)="editarAlmacen(almacen)"
              />
              <p-button 
                icon="pi pi-trash" 
                [text]="true" 
                severity="danger" 
                (click)="eliminarAlmacen(almacen.id)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
  
  <p-confirmDialog />
  <p-dialog 
    [(visible)]="visible" 
    [modal]="true" 
    [header]="editando ? 'Editar Almacén' : 'Nuevo Almacén'" 
    [style]="{ width: '450px' }"
    class="p-fluid"
  >
    <form [formGroup]="almacenForm" (ngSubmit)="funGuardar()" class="flex flex-col gap-6 pt-4">
      
      <div class="flex flex-col gap-2">
        <label class="text-sm font-bold text-slate-700">Sucursal Asignada</label>
        <p-select 
          [options]="sucursales()" 
          formControlName="sucursal_id" 
          optionLabel="nombre" 
          optionValue="id"
          placeholder="Seleccione sucursal"
          appendTo="body"
        />
      </div>
  
      <div class="flex flex-col gap-2">
        <label class="text-sm font-bold text-slate-700">Nombre</label>
        <input pInputText formControlName="nombre" placeholder="Nombre descriptivo" class="p-3" />
      </div>
  
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-bold text-slate-700">Código</label>
          <input pInputText formControlName="codigo" placeholder="ABC-123" />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-bold text-slate-700">Descripción</label>
          <input pInputText formControlName="descripcion" placeholder="Opcional" />
        </div>
      </div>
  
      <div class="flex justify-end gap-3 mt-8">
        <p-button label="Cancelar" severity="secondary" [text]="true" (click)="visible = false" />
        <p-button 
          [label]="editando ? 'Actualizar Almacén' : 'Crear Almacén'" 
          icon="pi pi-check" 
          type="submit" 
          [disabled]="almacenForm.invalid" 
        />
      </div>
    </form>
  </p-dialog>
