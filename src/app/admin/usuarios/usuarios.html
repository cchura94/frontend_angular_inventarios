<div class="card">
    <div class="card flex justify-center">
        <p-button (click)="showDialog()" label="Nuevo Usuario" />
        <p-dialog header="Gestión Usuarios" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }" [formGroup]="userForm">
            <span class="p-text-secondary block mb-8">Actualiza la información.</span>
            <div class="flex items-center gap-4 mb-4">
                <label for="name" class="font-semibold w-24">Nombre</label>
                <input pInputText id="name" class="flex-auto" pInputText  autocomplete="off" formControlName="name" />
            </div>
            <div class="flex items-center gap-4 mb-8">
                <label for="email" class="font-semibold w-24">Correo</label>
                <input pInputText id="email" class="flex-auto" pInputText  autocomplete="off" formControlName="email" />
            </div>
            <div class="flex items-center gap-4 mb-4">
                <label for="name" class="font-semibold w-24">Contraseña</label>
                <input pInputText id="name" class="flex-auto" pInputText  autocomplete="off" formControlName="name" />
            </div>
            <div class="flex justify-end gap-2">
                <p-button label="Cancelar" severity="secondary"pInputText  (click)="visible = false" formControlName="password" />
                <p-button label="Guardar Cambios" (click)="funGuardarUsuario()" />
            </div>
        </p-dialog>
    </div>

    <p-table [value]="usuarios()" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template #header>
            <tr>
                <th>ID</th>
                <th>NOMBRE</th>
                <th>CORREO</th>
                <th>ACCIÓN</th>
            </tr>
        </ng-template>
        <ng-template #body let-product>
            <tr>
                <td>{{ product.id }}</td>
                <td>{{ product.name }}</td>
                <td>{{ product.email }}</td>
                <td>{{ product.quantity }}</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<h1>Gestión de Usuarios</h1>

{{ usuarios() }}

<form [formGroup]="userForm" (ngSubmit)="funGuardarUsuario()">
    <label for="">Ingrese su Nombre</label>
    <input type="text" formControlName="name">
    <br>
    <label for="">Ingrese su Correo</label>
    <input type="email" formControlName="email">
    <br>
    <label for="">Ingrese su Contraseña</label>
    <input type="password" formControlName="password">
    <br>
    <input type="submit" value="Guardar Cambios" [disabled]="!userForm.valid">
</form>


<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>CORREO</th>
            <th>NOMBRE</th>
            <th>ACCIÓN</th>
        </tr>
    </thead>
    <tbody>
        @for (u of usuarios(); track $index) {
            <tr>
                <td>{{ u.id }}</td>
                <td>{{ u.email }}</td>
                <td>{{ u.name }}</td>
                <td>
                    <button (click)="funEditarUsuario(u)">editar</button>
                </td>
            </tr>
        }
    </tbody>
</table>
